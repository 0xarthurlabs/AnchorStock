# Build & deploy Next.js to Cloud Run (same Environment variables pattern as backend release).
name: Frontend release (Cloud Run)

on:
  workflow_dispatch:
    inputs:
      env:
        description: GitHub Environment (staging|prod)
        required: true
        type: choice
        options:
          - staging
          - prod

permissions:
  contents: read
  id-token: write

jobs:
  resolve:
    name: resolve
    runs-on: ubuntu-latest
    environment: ${{ inputs.env }}
    outputs:
      project_id: ${{ steps.out.outputs.project_id }}
      region: ${{ steps.out.outputs.region }}
      service: ${{ steps.out.outputs.frontend_service }}
      gar_repo: ${{ steps.out.outputs.gar_repo }}
      image_name: ${{ steps.out.outputs.frontend_image_name }}
      vpc_connector: ${{ steps.out.outputs.vpc_connector }}
      vpc_egress: ${{ steps.out.outputs.vpc_egress }}
      next_public_rpc_url: ${{ steps.out.outputs.next_public_rpc_url }}
      next_public_rpc_origin_allowlist: ${{ steps.out.outputs.next_public_rpc_origin_allowlist }}
      next_public_backend_api_url: ${{ steps.out.outputs.next_public_backend_api_url }}
      next_public_wallet_connect_project_id: ${{ steps.out.outputs.next_public_wallet_connect_project_id }}
      next_public_chain_id: ${{ steps.out.outputs.next_public_chain_id }}
      next_public_deployments_sha256: ${{ steps.out.outputs.next_public_deployments_sha256 }}
    steps:
      - name: Export environment-scoped variables
        id: out
        shell: bash
        run: |
          set -euo pipefail
          echo "project_id=${{ vars.PROJECT_ID }}" >> "$GITHUB_OUTPUT"
          echo "region=${{ vars.REGION }}" >> "$GITHUB_OUTPUT"
          echo "gar_repo=${{ vars.GAR_REPO }}" >> "$GITHUB_OUTPUT"
          echo "frontend_service=${{ vars.FRONTEND_SERVICE }}" >> "$GITHUB_OUTPUT"
          echo "frontend_image_name=${{ vars.FRONTEND_IMAGE_NAME || 'anchorstock-frontend' }}" >> "$GITHUB_OUTPUT"
          echo "vpc_connector=${{ vars.VPC_CONNECTOR }}" >> "$GITHUB_OUTPUT"
          echo "vpc_egress=${{ vars.VPC_EGRESS || 'all-traffic' }}" >> "$GITHUB_OUTPUT"
          echo "next_public_rpc_url=${{ vars.NEXT_PUBLIC_RPC_URL }}" >> "$GITHUB_OUTPUT"
          echo "next_public_rpc_origin_allowlist=${{ vars.NEXT_PUBLIC_RPC_ORIGIN_ALLOWLIST }}" >> "$GITHUB_OUTPUT"
          echo "next_public_backend_api_url=${{ vars.NEXT_PUBLIC_BACKEND_API_URL }}" >> "$GITHUB_OUTPUT"
          echo "next_public_wallet_connect_project_id=${{ vars.NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID }}" >> "$GITHUB_OUTPUT"
          echo "next_public_chain_id=${{ vars.NEXT_PUBLIC_CHAIN_ID }}" >> "$GITHUB_OUTPUT"
          echo "next_public_deployments_sha256=${{ vars.NEXT_PUBLIC_DEPLOYMENTS_SHA256 }}" >> "$GITHUB_OUTPUT"
          for k in project_id region gar_repo frontend_service next_public_rpc_url next_public_rpc_origin_allowlist next_public_backend_api_url next_public_chain_id; do
            v="$(grep -E "^${k}=" "$GITHUB_OUTPUT" | cut -d= -f2- || true)"
            if [ -z "$v" ]; then
              echo "ERROR: missing Environment variable: $k" >&2
              exit 1
            fi
          done

  deploy:
    name: deploy
    needs: [resolve]
    uses: ./.github/workflows/deploy-frontend.yml
    secrets: inherit
    with:
      project_id: ${{ needs.resolve.outputs.project_id }}
      region: ${{ needs.resolve.outputs.region }}
      service: ${{ needs.resolve.outputs.service }}
      gar_repo: ${{ needs.resolve.outputs.gar_repo }}
      image_name: ${{ needs.resolve.outputs.image_name }}
      vpc_connector: ${{ needs.resolve.outputs.vpc_connector }}
      vpc_egress: ${{ needs.resolve.outputs.vpc_egress }}
      env_name: ${{ inputs.env }}
      next_public_app_env: ${{ inputs.env }}
      next_public_chain_id: ${{ needs.resolve.outputs.next_public_chain_id }}
      next_public_rpc_url: ${{ needs.resolve.outputs.next_public_rpc_url }}
      next_public_rpc_origin_allowlist: ${{ needs.resolve.outputs.next_public_rpc_origin_allowlist }}
      next_public_backend_api_url: ${{ needs.resolve.outputs.next_public_backend_api_url }}
      next_public_wallet_connect_project_id: ${{ needs.resolve.outputs.next_public_wallet_connect_project_id }}
      next_public_deployments_sha256: ${{ needs.resolve.outputs.next_public_deployments_sha256 }}
      deployments_artifact_name: ""
