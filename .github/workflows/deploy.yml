name: Deploy (Cloud Run)

on:
  workflow_call:
    inputs:
      project_id:
        description: GCP project id
        required: true
        type: string
      region:
        description: Cloud Run region (e.g. us-central1)
        required: true
        type: string
      service:
        description: Cloud Run service name
        required: true
        type: string
      gar_repo:
        description: Artifact Registry repo name (Docker)
        required: true
        type: string
      image_name:
        description: Image name (within repo)
        required: true
        type: string
        default: anchorstock-api
      dockerfile:
        description: Path to Dockerfile
        required: true
        type: string
        default: docker/cloudrun/api-server.Dockerfile
      context:
        description: Docker build context directory
        required: true
        type: string
        default: .
      smoke_path:
        description: HTTP path for smoke check
        required: true
        type: string
        default: /health
      promote_image_ref:
        description: If set, skip build/push and deploy this image (full URI with tag or @sha256 digest)
        required: false
        type: string
        default: ""
      db_host:
        description: DB_HOST for Cloud Run env (empty = skip DB env injection)
        required: false
        type: string
        default: ""
      db_port:
        description: DB_PORT
        required: false
        type: string
        default: "5432"
      db_user:
        description: DB_USER
        required: false
        type: string
        default: "anchorstock"
      db_name:
        description: DB_NAME
        required: false
        type: string
        default: "anchorstock"
      vpc_connector:
        description: Serverless VPC Access connector resource name (empty = skip)
        required: false
        type: string
        default: ""
      vpc_egress:
        description: VPC egress (all-traffic or private-ranges-only)
        required: false
        type: string
        default: "all-traffic"
      env_name:
        description: GitHub Environment name (enables per-env secrets; empty = no environment)
        required: false
        type: string
        default: ""
    outputs:
      service_url:
        description: Deployed HTTPS URL for the Cloud Run service
        value: ${{ jobs.build-push-deploy-smoke.outputs.service_url }}
      image_ref:
        description: Immutable image reference used for deploy (digest form when built in this job)
        value: ${{ jobs.build-push-deploy-smoke.outputs.image_ref }}
      revision_name:
        description: Revision currently receiving traffic after deploy
        value: ${{ jobs.build-push-deploy-smoke.outputs.revision_name }}
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER:
        required: true
      GCP_SERVICE_ACCOUNT_EMAIL:
        required: true
      DB_PASSWORD:
        required: false
  workflow_dispatch:
    inputs:
      project_id:
        description: GCP project id
        required: true
      region:
        description: Cloud Run region (e.g. us-central1)
        required: true
      service:
        description: Cloud Run service name
        required: true
      gar_repo:
        description: Artifact Registry repo name (Docker)
        required: true
      image_name:
        description: Image name (within repo)
        required: true
        default: anchorstock-api
      dockerfile:
        description: Path to Dockerfile
        required: true
        default: docker/cloudrun/api-server.Dockerfile
      context:
        description: Docker build context directory
        required: true
        default: .
      smoke_path:
        description: HTTP path for smoke check
        required: true
        default: /health
      promote_image_ref:
        description: If set, skip build/push and deploy this image
        required: false
        type: string
        default: ""
      db_host:
        description: DB_HOST for Cloud Run env (empty = skip DB env injection)
        required: false
        default: ""
      db_port:
        description: DB_PORT
        required: false
        default: "5432"
      db_user:
        description: DB_USER
        required: false
        default: "anchorstock"
      db_name:
        description: DB_NAME
        required: false
        default: "anchorstock"
      vpc_connector:
        description: Serverless VPC Access connector resource name (empty = skip)
        required: false
        default: ""
      vpc_egress:
        description: VPC egress (all-traffic or private-ranges-only)
        required: false
        default: "all-traffic"
      env_name:
        description: GitHub Environment name (enables per-env secrets; empty = no environment)
        required: false
        default: ""

concurrency:
  group: deploy-${{ inputs.project_id }}-${{ inputs.region }}-${{ inputs.service }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  build-push-deploy-smoke:
    name: build-push-deploy-smoke
    runs-on: ubuntu-latest
    environment: ${{ inputs.env_name || '' }}
    outputs:
      service_url: ${{ steps.url.outputs.service_url }}
      image_ref: ${{ steps.imgref.outputs.image_ref }}
      revision_name: ${{ steps.rev.outputs.revision_name }}
    env:
      PROJECT_ID: ${{ inputs.project_id }}
      REGION: ${{ inputs.region }}
      SERVICE: ${{ inputs.service }}
      GAR_REPO: ${{ inputs.gar_repo }}
      IMAGE_NAME: ${{ inputs.image_name }}
      DOCKERFILE: ${{ inputs.dockerfile }}
      CONTEXT: ${{ inputs.context }}
      SMOKE_PATH: ${{ inputs.smoke_path }}
      PROMOTE_IMAGE_REF: ${{ inputs.promote_image_ref }}
      DEPLOY_DB_HOST: ${{ inputs.db_host }}
      DEPLOY_DB_PORT: ${{ inputs.db_port }}
      DEPLOY_DB_USER: ${{ inputs.db_user }}
      DEPLOY_DB_NAME: ${{ inputs.db_name }}
      DEPLOY_DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      VPC_CONNECTOR: ${{ inputs.vpc_connector }}
      VPC_EGRESS: ${{ inputs.vpc_egress }}
    steps:
      - name: Checkout
        if: ${{ inputs.promote_image_ref == '' }}
        uses: actions/checkout@v4

      - name: Auth to Google Cloud (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        if: ${{ inputs.promote_image_ref == '' }}
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Compute tag URI (build path)
        if: ${{ inputs.promote_image_ref == '' }}
        id: tag
        run: |
          set -euo pipefail
          IMAGE_TAG_URI="${REGION}-docker.pkg.dev/${PROJECT_ID}/${GAR_REPO}/${IMAGE_NAME}:${GITHUB_SHA}"
          echo "IMAGE_TAG_URI=${IMAGE_TAG_URI}" >> "$GITHUB_OUTPUT"
          echo "Will build/push: ${IMAGE_TAG_URI}"

      - name: Build and push image
        if: ${{ inputs.promote_image_ref == '' }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          push: true
          tags: ${{ steps.tag.outputs.IMAGE_TAG_URI }}

      - name: Resolve immutable image reference (@digest)
        id: imgref
        run: |
          set -euo pipefail
          if [ -n "${PROMOTE_IMAGE_REF}" ]; then
            echo "image_ref=${PROMOTE_IMAGE_REF}" >> "$GITHUB_OUTPUT"
            echo "mode=promote" >> "$GITHUB_OUTPUT"
            echo "Deploy mode: promote existing image"
            exit 0
          fi
          TAG_URI="${{ steps.tag.outputs.IMAGE_TAG_URI }}"
          DIGEST="$(gcloud artifacts docker images describe "${TAG_URI}" --format='value(image_summary.digest)' || true)"
          if [ -z "${DIGEST}" ]; then
            echo "ERROR: failed to resolve digest for ${TAG_URI}" >&2
            exit 1
          fi
          BASEREF="${REGION}-docker.pkg.dev/${PROJECT_ID}/${GAR_REPO}/${IMAGE_NAME}"
          REF="${BASEREF}@${DIGEST}"
          echo "image_ref=${REF}" >> "$GITHUB_OUTPUT"
          echo "mode=build" >> "$GITHUB_OUTPUT"
          echo "Immutable image: ${REF}"

      - name: Deploy to Cloud Run (by digest)
        run: |
          set -euo pipefail
          IMG="${{ steps.imgref.outputs.image_ref }}"
          echo "Deploying service=${SERVICE} region=${REGION} project=${PROJECT_ID}"
          echo "Image: ${IMG}"

          CMD=(gcloud run deploy "${SERVICE}"
               --project "${PROJECT_ID}"
               --region  "${REGION}"
               --image   "${IMG}")

          if [ -n "${DEPLOY_DB_HOST:-}" ]; then
            envlist="DB_HOST=${DEPLOY_DB_HOST}"
            envlist="${envlist},DB_PORT=${DEPLOY_DB_PORT:-5432}"
            envlist="${envlist},DB_USER=${DEPLOY_DB_USER:-anchorstock}"
            envlist="${envlist},DB_NAME=${DEPLOY_DB_NAME:-anchorstock}"
            if [ -n "${DEPLOY_DB_PASSWORD:-}" ]; then
              envlist="${envlist},DB_PASSWORD=${DEPLOY_DB_PASSWORD}"
            fi
            CMD+=(--set-env-vars "${envlist}")
            echo "DB env vars injected (DB_HOST=${DEPLOY_DB_HOST})"
          fi

          if [ -n "${VPC_CONNECTOR:-}" ]; then
            CMD+=(--vpc-connector "${VPC_CONNECTOR}"
                  --vpc-egress    "${VPC_EGRESS:-all-traffic}")
            echo "VPC connector: ${VPC_CONNECTOR} egress=${VPC_EGRESS:-all-traffic}"
          fi

          CMD+=(--allow-unauthenticated --quiet)
          "${CMD[@]}"

      - name: Get service URL
        id: url
        run: |
          set -euo pipefail
          SU="$(gcloud run services describe "${SERVICE}" --project "${PROJECT_ID}" --region "${REGION}" --format='value(status.url)')"
          if [ -z "${SU}" ]; then
            echo "ERROR: failed to get Cloud Run service URL" >&2
            exit 1
          fi
          echo "service_url=${SU}" >> "$GITHUB_OUTPUT"
          echo "Service URL: ${SU}"

      - name: Get active revision
        id: rev
        run: |
          set -euo pipefail
          RN="$(gcloud run services describe "${SERVICE}" --project "${PROJECT_ID}" --region "${REGION}" --format='value(status.traffic[0].revisionName)')"
          echo "revision_name=${RN}" >> "$GITHUB_OUTPUT"
          echo "Active revision: ${RN}"

      - name: Smoke check
        run: |
          set -euo pipefail
          TARGET="${{ steps.url.outputs.service_url }}${SMOKE_PATH}"
          echo "Smoke check: GET ${TARGET}"
          http_code="$(curl -sS -o /tmp/smoke-body.txt -w '%{http_code}' "${TARGET}" || true)"
          echo "HTTP ${http_code}"
          echo "--- body ---"
          cat /tmp/smoke-body.txt || true
          if [ "${http_code}" != "200" ]; then
            echo "ERROR: smoke check failed (expected 200)" >&2
            exit 1
          fi

      - name: Audit summary (deploy)
        if: always()
        run: |
          {
            echo "## Cloud Run deploy audit"
            echo "- workflow: ${{ github.workflow }}"
            echo "- run: ${{ github.run_id }} attempt ${{ github.run_attempt }}"
            echo "- actor: ${{ github.actor }}"
            echo "- service_url: ${{ steps.url.outputs.service_url }}"
            echo "- image_ref: ${{ steps.imgref.outputs.image_ref }}"
            echo "- revision: ${{ steps.rev.outputs.revision_name }}"
            echo "- project/region/service: ${PROJECT_ID} / ${REGION} / ${SERVICE}"
            echo "- db_host: ${DEPLOY_DB_HOST:-(not set)}"
            echo "- db_port: ${DEPLOY_DB_PORT:-(not set)}"
            echo "- db_user: ${DEPLOY_DB_USER:-(not set)}"
            echo "- db_name: ${DEPLOY_DB_NAME:-(not set)}"
            echo "- db_password: *(masked)*"
            echo "- vpc_connector: ${VPC_CONNECTOR:-(not set)}"
            echo "- vpc_egress: ${VPC_EGRESS:-(not set)}"
          } >> "$GITHUB_STEP_SUMMARY"
